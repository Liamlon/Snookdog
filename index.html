<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snookdog">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<title>Snookdog</title>

<style>
body {
  background: radial-gradient(circle at top, #146b46, #062b1d);
  color: white;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
  overflow: hidden; 
  touch-action: manipulation; 
}

.container {
  height: 100vh;
  height: 100dvh; 
  display: flex;
  flex-direction: column;
  justify-content: space-evenly; 
  align-items: center;
  padding: 10px 0;
  box-sizing: border-box;
}

h1 {
  font-size: 20px;
  margin: 0;
  font-weight: 800;
  letter-spacing: 1px;
  color: #e0e0e0;
  z-index: 10;
}

.timer {
  font-size: 14px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 4px 12px;
  border-radius: 30px;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.2);
  z-index: 10;
}

.players {
  width: 100%;
  display: flex;
  justify-content: space-around;
  z-index: 5;
}

.player-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 40%;
}

.player-box {
  padding: 8px 0;
  width: 100%;
  font-size: clamp(14px, 3vw, 18px); 
  font-weight: 600;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.active {
  background: rgba(255, 215, 0, 0.2);
  border: 1px solid gold;
  color: gold;
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

.score-display {
  font-size: clamp(80px, 16vh, 160px); 
  font-weight: 800;
  margin: 0; 
  line-height: 1;
  text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
}

.log-container {
  font-size: 12px;
  color: #88d4b4;
  min-height: 40px; 
  font-weight: 600;
}

.balls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(5px, 1.5vh, 12px); 
  z-index: 10;
}

.row {
  display: flex;
  gap: clamp(5px, 1.5vh, 12px);
}

.ball {
  width: clamp(45px, 8vh, 65px);
  height: clamp(45px, 8vh, 65px);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: clamp(16px, 3vh, 22px);
  font-weight: 800;
  cursor: pointer;
  box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.4); 
  color: white;
  transition: transform 0.1s ease;
}

.ball:active {
  transform: scale(0.9);
}

.red { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b); }
.black { background: radial-gradient(circle at 30% 30%, #555, #111); }
.pink { background: radial-gradient(circle at 30% 30%, #ff9ecd, #d1005a); }
.blue { background: radial-gradient(circle at 30% 30%, #4a90e2, #003399); }
.yellow { background: radial-gradient(circle at 30% 30%, #f1c40f, #f39c12); color: black; text-shadow: none; }
.brown { background: radial-gradient(circle at 30% 30%, #a0522d, #5c3a21); }
.green { background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60); }

.foul {
  padding: clamp(8px, 2vh, 12px) 35px; 
  font-size: 16px; 
  background: linear-gradient(135deg, #ff7b7b, #ff4747); 
  color: white;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 800;
  border: none;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  transition: transform 0.1s ease;
  z-index: 10;
}

.foul:active {
  transform: scale(0.95);
}

.side-buttons {
  position: fixed;
  right: 15px;
  top: 50%; 
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 20;
}

.side-buttons button {
  display: block;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  backdrop-filter: blur(5px);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  font-size: 12px;
}

.side-buttons .finish-btn {
  background: linear-gradient(135deg, #f1c40f, #f39c12); 
  color: black; 
  font-weight: 800;
  margin-top: 5px; 
}

.frames-side {
  margin-top: 5px;
  background: rgba(0, 0, 0, 0.3); 
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: gold;
  text-align: left;
  line-height: 1.6;
  border: 1px solid rgba(255,215,0,0.2);
}

/* =========================================
   חוקים לאייפד לרוחב (מסכים גדולים)
   ========================================= */
@media (min-width: 768px) and (orientation: landscape) {
  .container {
    justify-content: center; 
  }
  
  h1 { position: absolute; top: 20px; font-size: 28px; }
  .timer { position: absolute; top: 60px; font-size: 18px; padding: 6px 20px; }
  
  .players {
    position: absolute;
    top: 25%;
    left: 0;
    width: 100%;
    padding: 0 8%;
    box-sizing: border-box;
    justify-content: space-between;
    pointer-events: none; 
  }
  
  .player-col {
    pointer-events: auto; 
    width: 30%;
  }
  
  .player-box {
    font-size: 24px;
    padding: 12px 0;
  }
  
  .score-display {
    font-size: 220px; 
    margin-top: -10px;
  }
  
  .log-container {
    font-size: 16px;
  }

  .balls {
    margin-top: 40px; 
    gap: 15px;
  }
  .row { gap: 15px; }
  
  .ball {
    width: 90px;
    height: 90px;
    font-size: 32px;
  }

  .foul {
    position: absolute;
    bottom: 30px;
    padding: 15px 50px;
    font-size: 22px;
  }

  /* כאן התיקון: מוריד את התפריט למטה! */
  .side-buttons {
    right: 25px;
    top: auto;        /* מבטל את המיקום באמצע */
    bottom: 30px;     /* מצמיד למטה */
    transform: none;  /* מבטל את המשיכה למעלה */
  }
  
  .side-buttons button {
    padding: 12px 20px;
    font-size: 16px;
  }
  
  .frames-side {
    padding: 12px 20px;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🎱 SCOREBOARD</h1>
<div id="timerDisplay" class="timer">00:00</div>

<div class="players">
  <div class="player-col">
    <div id="p1" class="player-box active" onclick="setPlayer(1)">Liam</div>
    <div id="score1" class="score-display">0</div>
    <div id="log1" class="log-container"></div>
  </div>
  <div class="player-col">
    <div id="p2" class="player-box" onclick="setPlayer(2)">Sharabani</div>
    <div id="score2" class="score-display">0</div>
    <div id="log2" class="log-container"></div>
  </div>
</div>

<div class="balls">
  <div class="ball red" onclick="addPoints(1)">1</div>
  <div class="ball black" onclick="addPoints(7)">7</div>
  <div class="ball pink" onclick="addPoints(6)">6</div>
  <div class="ball blue" onclick="addPoints(5)">5</div>

  <div class="row">
    <div class="ball green" onclick="addPoints(3)">3</div>
    <div class="ball brown" onclick="addPoints(4)">4</div>
    <div class="ball yellow" onclick="addPoints(2)">2</div>
  </div>
</div>

<button class="foul" onclick="foul()">FOUL</button>

</div>

<div class="side-buttons">
  <button onclick="undo()">Undo</button>
  <button onclick="resetGame()">Reset</button>
  <button class="finish-btn" onclick="finishFrame()">Finish</button>
  
  <div class="frames-side">
    <div id="side-f1">Liam: 0</div>
    <div id="side-f2">Sharabani: 0</div>
  </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  
  const osc = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  osc.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  
  if (type === 'hit') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
    if (navigator.vibrate) navigator.vibrate(50); 
    
  } else if (type === 'foul') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
    
  } else if (type === 'finish') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]); 
  }
}

let score1 = localStorage.getItem("score1") ? parseInt(localStorage.getItem("score1")) : 0;
let score2 = localStorage.getItem("score2") ? parseInt(localStorage.getItem("score2")) : 0;
let frames1 = localStorage.getItem("frames1") ? parseInt(localStorage.getItem("frames1")) : 0;
let frames2 = localStorage.getItem("frames2") ? parseInt(localStorage.getItem("frames2")) : 0;
let currentPlayer = localStorage.getItem("player") ? parseInt(localStorage.getItem("player")) : 1;
let log1 = localStorage.getItem("log1") ? JSON.parse(localStorage.getItem("log1")) : [];
let log2 = localStorage.getItem("log2") ? JSON.parse(localStorage.getItem("log2")) : [];
let secondsElapsed = localStorage.getItem("timer") ? parseInt(localStorage.getItem("timer")) : 0;

let history = [];
let timerInterval = null;
let isTimerRunning = false;

function startTimer() {
  if (isTimerRunning) return; 
  isTimerRunning = true;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsElapsed++;
    localStorage.setItem("timer", secondsElapsed);
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  isTimerRunning = false;
  clearInterval(timerInterval);
}

function updateTimerDisplay() {
  let m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
  let s = (secondsElapsed % 60).toString().padStart(2, '0');
  document.getElementById('timerDisplay').innerText = `${m}:${s}`;
}

if (score1 > 0 || score2 > 0 || secondsElapsed > 0) {
  startTimer();
}

updateTimerDisplay();
updateUI();

function save() {
  localStorage.setItem("score1", score1);
  localStorage.setItem("score2", score2);
  localStorage.setItem("frames1", frames1);
  localStorage.setItem("frames2", frames2);
  localStorage.setItem("player", currentPlayer);
  localStorage.setItem("log1", JSON.stringify(log1));
  localStorage.setItem("log2", JSON.stringify(log2));
}

function updateUI() {
  document.getElementById("score1").innerText = score1;
  document.getElementById("score2").innerText = score2;
  
  document.getElementById("side-f1").innerText = "Liam: " + frames1;
  document.getElementById("side-f2").innerText = "Sharabani: " + frames2;

  document.getElementById("p1").classList.remove("active");
  document.getElementById("p2").classList.remove("active");
  document.getElementById("p" + currentPlayer).classList.add("active");

  document.getElementById("log1").innerHTML = log1.join("<br>");
  document.getElementById("log2").innerHTML = log2.join("<br>");
}

function saveHistory() {
  history.push({
    score1, score2, frames1, frames2, currentPlayer,
    log1: [...log1], log2: [...log2], secondsElapsed
  });
}

function addLog(player, text) {
  if (player === 1) {
    log1.push(text);
    if (log1.length > 3) log1.shift(); 
  } else {
    log2.push(text);
    if (log2.length > 3) log2.shift();
  }
}

function setPlayer(player) {
  currentPlayer = player;
  save();
  updateUI();
}

function addPoints(points) {
  startTimer(); 
  playSound('hit');
  saveHistory();
  if (currentPlayer === 1) {
    score1 += points;
    addLog(1, "+" + points);
  } else {
    score2 += points;
    addLog(2, "+" + points);
  }
  save();
  updateUI();
}

function foul() {
  startTimer(); 
  playSound('foul');
  saveHistory();
  if (currentPlayer === 1) {
    score2 += 4; 
    addLog(2, "+4 Foul");
    currentPlayer = 2; 
  } else {
    score1 += 4;
    addLog(1, "+4 Foul");
    currentPlayer = 1; 
  }
  save();
  updateUI();
}

function finishFrame() {
  if (score1 === score2) {
    alert("Draw! Someone must lead to finish the frame.");
    return;
  }
  playSound('finish');
  saveHistory();
  if (score1 > score2) frames1++;
  else frames2++;
  
  stopTimer(); 
  score1 = 0;
  score2 = 0;
  log1 = [];
  log2 = [];
  secondsElapsed = 0; 
  localStorage.setItem("timer", 0);
  updateTimerDisplay();
  save();
  updateUI();
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  score1 = last.score1;
  score2 = last.score2;
  frames1 = last.frames1;
  frames2 = last.frames2;
  currentPlayer = last.currentPlayer;
  log1 = last.log1;
  log2 = last.log2;
  secondsElapsed = last.secondsElapsed;
  localStorage.setItem("timer", secondsElapsed);
  
  if (score1 === 0 && score2 === 0) {
    stopTimer();
  }
  
  updateTimerDisplay();
  save();
  updateUI();
}

function resetGame() {
  if(!confirm("Reset everything including frames?")) return;
  stopTimer(); 
  score1 = 0;
  score2 = 0;
  frames1 = 0;
  frames2 = 0;
  currentPlayer = 1;
  log1 = [];
  log2 = [];
  history = [];
  secondsElapsed = 0;
  localStorage.setItem("timer", 0);
  updateTimerDisplay();
  save();
  updateUI();
}
</script>

</body>
</html>
